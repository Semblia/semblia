name: Production release

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type DEPLOY_PRODUCTION to continue
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: production-release
  cancel-in-progress: false

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "11.1.3"
  API_IMAGE: ghcr.io/semblia/semblia-api:${{ github.sha }}

jobs:
  verify:
    name: Verify release commit
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Require explicit confirmation
        env:
          CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          if [ "$CONFIRMATION" != "DEPLOY_PRODUCTION" ]; then
            echo "confirmation must be DEPLOY_PRODUCTION" >&2
            exit 1
          fi

      - name: Checkout requested commit
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @workspace/database generate

      - name: Run release gates
        run: pnpm validate:release

  publish-api-image:
    name: Publish immutable API image
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout requested commit
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and publish SHA-tagged image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/semblia/semblia-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-web:
    name: Deploy web_v2 to Vercel
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    outputs:
      deployment-url: ${{ steps.deploy.outputs.url }}
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_WEB_V2_PROJECT_ID }}
    steps:
      - name: Checkout requested commit
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Pull production project configuration
        run: pnpm dlx vercel@55.0.0 pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build with production environment
        run: pnpm dlx vercel@55.0.0 build --prod --token="$VERCEL_TOKEN"

      - name: Deploy prebuilt production output
        id: deploy
        run: |
          url=$(pnpm dlx vercel@55.0.0 deploy --prebuilt --prod --token="$VERCEL_TOKEN")
          echo "url=$url" >> "$GITHUB_OUTPUT"

  deploy-api-worker:
    name: Deploy API and worker
    needs:
      - publish-api-image
      - deploy-web
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    permissions:
      contents: read
      packages: read
    env:
      PRODUCTION_SSH_HOST: ${{ secrets.PRODUCTION_SSH_HOST }}
      PRODUCTION_SSH_USER: ${{ secrets.PRODUCTION_SSH_USER }}
      PRODUCTION_SSH_PRIVATE_KEY: ${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}
      PRODUCTION_SSH_KNOWN_HOSTS: ${{ secrets.PRODUCTION_SSH_KNOWN_HOSTS }}
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GHCR_USER: ${{ github.actor }}
    steps:
      - name: Checkout requested commit
        uses: actions/checkout@v4

      - name: Prepare pinned SSH identity
        run: |
          install -d -m 0700 "$HOME/.ssh"
          printf '%s\n' "$PRODUCTION_SSH_PRIVATE_KEY" > "$HOME/.ssh/id_ed25519"
          printf '%s\n' "$PRODUCTION_SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 0600 "$HOME/.ssh/id_ed25519" "$HOME/.ssh/known_hosts"

      - name: Stage the checked-in production bundle
        run: |
          target="$PRODUCTION_SSH_USER@$PRODUCTION_SSH_HOST"
          ssh "$target" "install -d -m 0750 /opt/semblia/deploy /opt/semblia/scripts"
          scp -r deploy/production "$target:/opt/semblia/deploy/"
          scp -r scripts/production "$target:/opt/semblia/scripts/"

      - name: Authenticate the host to GHCR
        run: |
          target="$PRODUCTION_SSH_USER@$PRODUCTION_SSH_HOST"
          printf '%s' "$GHCR_TOKEN" | ssh "$target" \
            "docker login ghcr.io --username '$GHCR_USER' --password-stdin"

      - name: Run backup-first API and worker deployment
        run: |
          target="$PRODUCTION_SSH_USER@$PRODUCTION_SSH_HOST"
          ssh "$target" \
            "cd /opt/semblia && chmod +x deploy/production/deploy.sh deploy/production/rollback.sh && SEMBLIA_IMAGE='$API_IMAGE' ENV_FILE=/opt/semblia/runtime.env ./deploy/production/deploy.sh"

  verify-public:
    name: Verify canonical production URLs
    needs:
      - deploy-web
      - deploy-api-worker
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: production
    steps:
      - name: Checkout requested commit
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run public-only production smoke
        run: |
          node scripts/production/spine.mjs \
            --app-url https://app.semblia.com \
            --api-url https://api.semblia.com \
            --public-only
