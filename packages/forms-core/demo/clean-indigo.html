<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>How was your experience? - Northwind</title>
    <style>
:root {
  color-scheme: light;
}
* {
  box-sizing: border-box;
}
body {
  margin: 0;
  min-height: 100vh;
  background:
    radial-gradient(circle at top left, color-mix(in srgb, var(--tresta-form-accent) 18%, transparent), transparent 34rem),
    var(--tresta-form-background);
  color: var(--tresta-form-text);
  font-family: var(--tresta-form-font-family);
}
.tresta-form-page {
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: clamp(1.25rem, 4vw, 4rem);
}
.tresta-form {
  width: min(100%, 44rem);
  display: grid;
  gap: 1rem;
}
.tresta-form__panel {
  border: 1px solid var(--tresta-form-border);
  border-radius: var(--tresta-form-radius);
  background: color-mix(in srgb, var(--tresta-form-surface) 94%, transparent);
  box-shadow: 0 24px 90px rgba(15, 23, 42, 0.12);
  padding: clamp(1.25rem, 4vw, 2.5rem);
}
.tresta-form__brand {
  margin: 0 0 .75rem;
  color: var(--tresta-form-accent);
  font-size: .78rem;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
}
.tresta-form__headline {
  margin: 0;
  max-width: 13ch;
  font-size: clamp(2.25rem, 7vw, 4.75rem);
  line-height: .94;
  letter-spacing: 0;
}
.tresta-form__subhead {
  margin: 1rem 0 0;
  max-width: 38rem;
  color: var(--tresta-form-muted-text);
  font-size: 1rem;
  line-height: 1.7;
}
.tresta-form__fields {
  display: grid;
  gap: 1rem;
  margin-top: 2rem;
}
.tresta-form__field {
  display: grid;
  gap: .5rem;
}
.tresta-form__field span {
  font-size: .9rem;
  font-weight: 700;
}
.tresta-form__field input,
.tresta-form__field textarea {
  width: 100%;
  border: 1px solid var(--tresta-form-border);
  border-radius: calc(var(--tresta-form-radius) * .72);
  background: var(--tresta-form-surface);
  color: var(--tresta-form-text);
  font: inherit;
  padding: .9rem 1rem;
  outline: none;
}
.tresta-form__field textarea {
  min-height: 9rem;
  resize: vertical;
}
.tresta-form__field input:focus,
.tresta-form__field textarea:focus {
  border-color: var(--tresta-form-accent);
  box-shadow: 0 0 0 4px color-mix(in srgb, var(--tresta-form-accent) 16%, transparent);
}
.tresta-form__submit {
  border: 0;
  border-radius: 999px;
  background: var(--tresta-form-accent);
  color: var(--tresta-form-accent-text);
  cursor: pointer;
  font: inherit;
  font-weight: 800;
  padding: .95rem 1.25rem;
}
.tresta-form__status {
  margin: 2rem 0 0;
  border-radius: calc(var(--tresta-form-radius) * .72);
  background: color-mix(in srgb, var(--tresta-form-accent) 10%, var(--tresta-form-surface));
  color: var(--tresta-form-text);
  padding: 1rem;
}
</style>
  </head>
  <body><div class="tresta-form-page" style="--tresta-form-accent:#4f46e5;--tresta-form-accent-text:#ffffff;--tresta-form-background:#f9fafe;--tresta-form-text:#191a1f;--tresta-form-muted-text:#61636a;--tresta-form-surface:#fefeff;--tresta-form-border:#dcdee3;--tresta-form-radius:18px;--tresta-form-font-family:&quot;Inter&quot;, ui-sans-serif, system-ui, sans-serif"><main class="tresta-form"><section class="tresta-form__panel"><p class="tresta-form__brand">Northwind</p><h1 class="tresta-form__headline">How was your experience?</h1><p class="tresta-form__subhead">Share a few words. It helps others understand what to expect.</p><form class="tresta-form__fields" action="#" method="post"><label class="tresta-form__field"><span>Your feedback</span><textarea name="answers[content]" placeholder="Tell us what stood out..." required=""></textarea></label><label class="tresta-form__field"><span>Your name</span><input type="text" placeholder="Jane Doe" required="" name="answers[authorName]"/></label><label class="tresta-form__field"><span>Email</span><input type="email" placeholder="jane@example.com" name="answers[authorEmail]"/></label><label class="tresta-form__field"><span>Rating</span><input type="number" min="1" max="5" name="answers[rating]"/></label><button class="tresta-form__submit" type="submit">Submit</button></form></section></main></div></body>
</html>
