<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tell us your story - Peach &amp; Pine</title>
    <style>
* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100vh;
  font-family: var(--f-font-body);
  font-size: var(--f-size-base);
  color: var(--f-ink);
  background-color: var(--f-bg);
  background-image: var(--f-texture);
  -webkit-font-smoothing: antialiased;
}
.tf-page {
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: clamp(1rem, 4vw, 3rem);
}
.tf-card {
  width: min(100%, 32rem);
  background: var(--f-surface);
  border: 1px solid var(--f-line);
  border-radius: var(--f-radius);
  box-shadow: var(--f-shadow);
  padding: var(--f-container-pad-y) var(--f-container-pad-x);
}
.tf-brand {
  display: inline-flex;
  align-items: center;
  gap: .5rem;
  margin: 0 0 var(--f-gap);
  font-family: var(--f-font-mono);
  font-size: var(--f-size-xs);
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--f-accent);
}
.tf-brand img { height: 1.5rem; width: auto; display: block; }
.tf-headline {
  margin: 0;
  font-family: var(--f-font-head);
  font-size: var(--f-size-head);
  font-weight: var(--f-weight-head);
  letter-spacing: var(--f-tracking-head);
  line-height: 1.12;
  color: var(--f-ink);
}
.tf-subhead {
  margin: .6rem 0 0;
  font-size: var(--f-size-base);
  line-height: 1.55;
  color: var(--f-ink-soft);
}
.tf-fields {
  display: grid;
  gap: var(--f-gap);
  margin-top: calc(var(--f-gap) * 1.4);
}
.tf-field { display: grid; gap: var(--f-label-gap); }
.tf-label { font-size: var(--f-size-sm); font-weight: 600; color: var(--f-ink); }
.tf-req { color: var(--f-accent); margin-left: .15rem; }
.tf-control,
.tf-input,
.tf-textarea,
.tf-select {
  width: 100%;
  font: inherit;
  color: var(--f-ink);
  background: var(--f-bg);
  border-style: solid;
  border-color: var(--f-line);
  border-width: var(--f-field-border-w);
  border-radius: var(--f-field-radius);
  padding: var(--f-field-pad) calc(var(--f-field-pad) + .15rem);
  outline: none;
  transition: border-color .12s, box-shadow .12s;
}
.tf-textarea { min-height: 7.5rem; resize: vertical; }
.tf-input:focus,
.tf-textarea:focus,
.tf-select:focus {
  border-color: var(--f-accent);
  box-shadow: 0 0 0 3px var(--f-accent-16);
}
.tf-rating {
  display: inline-flex;
  flex-direction: row-reverse;
  justify-content: flex-end;
  gap: .15rem;
  border: 0; padding: 0; margin: 0;
}
.tf-rating input { position: absolute; width: 1px; height: 1px; opacity: 0; }
.tf-rating label {
  font-size: 1.7rem;
  line-height: 1;
  color: var(--f-line);
  cursor: pointer;
  transition: color .1s;
}
.tf-rating label:hover,
.tf-rating label:hover ~ label,
.tf-rating input:checked ~ label { color: var(--f-accent); }
.tf-rating input:focus-visible + label { outline: 2px solid var(--f-accent); outline-offset: 2px; }
.tf-choices { display: grid; gap: var(--f-label-gap); }
.tf-choice {
  display: flex;
  align-items: center;
  gap: .5rem;
  font-size: var(--f-size-base);
  color: var(--f-ink);
}
.tf-actions { margin-top: calc(var(--f-gap) * 1.3); display: flex; }
.tf-submit {
  display: inline-flex;
  justify-content: center;
  align-items: center;
  width: var(--f-btn-width);
  border: var(--f-btn-border-w) solid var(--f-btn-border-c);
  border-radius: var(--f-btn-radius);
  background: var(--f-btn-bg);
  color: var(--f-btn-color);
  box-shadow: var(--f-btn-shadow);
  padding: var(--f-btn-pad-y) var(--f-btn-pad-x);
  font: inherit;
  font-weight: 600;
  text-transform: var(--f-btn-uppercase);
  letter-spacing: var(--f-btn-tracking);
  cursor: pointer;
}
.tf-submit:hover { filter: brightness(.96); }
.tf-status {
  margin-top: var(--f-gap);
  border-radius: var(--f-field-radius);
  background: var(--f-accent-08);
  color: var(--f-ink);
  padding: var(--f-field-pad);
  font-size: var(--f-size-base);
}
</style>
  </head>
  <body><div class="tf-page" style="--f-bg:#eef7f4;--f-surface:#ffffff;--f-ink:#0b1f1c;--f-ink-soft:#4b635e;--f-line:#cfe4dd;--f-accent:#0f766e;--f-accent-ink:#ffffff;--f-accent-08:#0f766e14;--f-accent-16:#0f766e29;--f-line-50:#cfe4dd80;--f-font-head:&quot;DM Sans&quot;, system-ui, sans-serif;--f-font-body:&quot;DM Sans&quot;, system-ui, sans-serif;--f-font-mono:ui-monospace, SFMono-Regular, Menlo, monospace;--f-size-base:16px;--f-size-head:30px;--f-size-sm:14px;--f-size-xs:12px;--f-weight-head:650;--f-weight-body:400;--f-tracking-head:-0.01em;--f-radius:18px;--f-field-radius:18px;--f-btn-radius:999px;--f-field-pad:14px;--f-gap:22px;--f-label-gap:8px;--f-container-pad-x:40px;--f-container-pad-y:44px;--f-btn-pad-x:35px;--f-btn-pad-y:14px;--f-shadow:0 8px 32px #0b1f1c0f;--f-btn-shadow:0 4px 14px #0f766e4d;--f-texture:none;--f-field-border-w:1.5px;--f-btn-uppercase:none;--f-btn-tracking:normal;--f-btn-bg:#0f766e;--f-btn-color:#ffffff;--f-btn-border-w:0;--f-btn-border-c:transparent;--f-btn-width:auto;--f-btn-justify:flex-start;color-scheme:light"><main class="tf-card"><p class="tf-brand"><span>Peach &amp; Pine</span></p><h1 class="tf-headline">Tell us your story</h1><p class="tf-subhead">A few words about working with us go a long way. Thank you.</p><form action="#" method="post"><div class="tf-fields"><div class="tf-field"><span class="tf-label">Your feedback<span class="tf-req" aria-hidden="true">*</span></span><textarea class="tf-textarea" name="answers[content]" placeholder="Tell us what stood out…" required=""></textarea></div><div class="tf-field"><span class="tf-label">Your name<span class="tf-req" aria-hidden="true">*</span></span><input class="tf-input" type="text" placeholder="Jane Doe" required="" name="answers[authorName]"/></div><div class="tf-field"><span class="tf-label">Email</span><input class="tf-input" type="email" placeholder="jane@example.com" name="answers[authorEmail]"/></div><div class="tf-field"><span class="tf-label">Rating</span><fieldset class="tf-rating" aria-label="Rating"><span style="display:contents"><input id="star-rating-5" type="radio" name="answers[rating]" value="5"/><label for="star-rating-5" title="5">★</label></span><span style="display:contents"><input id="star-rating-4" type="radio" name="answers[rating]" value="4"/><label for="star-rating-4" title="4">★</label></span><span style="display:contents"><input id="star-rating-3" type="radio" name="answers[rating]" value="3"/><label for="star-rating-3" title="3">★</label></span><span style="display:contents"><input id="star-rating-2" type="radio" name="answers[rating]" value="2"/><label for="star-rating-2" title="2">★</label></span><span style="display:contents"><input id="star-rating-1" type="radio" name="answers[rating]" value="1"/><label for="star-rating-1" title="1">★</label></span></fieldset></div></div><div class="tf-actions"><button class="tf-submit" type="submit">Submit</button></div></form></main></div></body>
</html>
