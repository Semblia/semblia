name: semblia-production

x-app: &app
  image: ${SEMBLIA_IMAGE:?set SEMBLIA_IMAGE to an immutable image tag}
  env_file:
    - ${RUNTIME_ENV_FILE:-runtime.env}
  init: true
  restart: unless-stopped
  pull_policy: always
  security_opt:
    - no-new-privileges:true
  logging:
    driver: json-file
    options:
      max-size: 10m
      max-file: "5"

services:
  validate:
    <<: *app
    restart: "no"
    command:
      - node
      - scripts/production/validate-env.mjs
      - /run/config/runtime.env
    volumes:
      - ${RUNTIME_ENV_FILE:-./runtime.env}:/run/config/runtime.env:ro
    profiles:
      - tools

  migrate:
    <<: *app
    restart: "no"
    command:
      - pnpm
      - --filter
      - "@workspace/database"
      - run
      - migrate:deploy
    profiles:
      - tools

  api:
    <<: *app
    command:
      - pnpm
      - --filter
      - api_v2
      - run
      - start:prod
    environment:
      API_V2_PORT: "8000"
    ports:
      - "127.0.0.1:${API_HOST_PORT:-8100}:8000"
    stop_grace_period: 30s

  worker:
    <<: *app
    command:
      - pnpm
      - --filter
      - api_v2
      - run
      - worker:start
    environment:
      WORKER_HEARTBEAT_PATH: /tmp/worker-heartbeat
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - >-
          const { statSync } = require('node:fs');
          const age = Date.now() - statSync('/tmp/worker-heartbeat').mtimeMs;
          if (age > 30000) process.exit(1)
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 5
    stop_grace_period: 60s

  backup:
    image: postgres:17-alpine
    env_file:
      - ${RUNTIME_ENV_FILE:-runtime.env}
    profiles:
      - tools
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./backups:/backups
    command:
      - /bin/sh
      - -c
      - >-
        pg_dump --format=custom
        --file=/backups/semblia-$$(date -u +%Y%m%dT%H%M%SZ).dump
        "$${DATABASE_URL}"
